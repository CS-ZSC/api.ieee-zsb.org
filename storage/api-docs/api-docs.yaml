      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                position:
                  type: string
                groupable_id:
                  type: integer
                groupable_type:
                  type: string
                track_id:
                  type: integer
                avatar_src:
                  type: string
                  format: uri
                linkedin:
                  type: string
