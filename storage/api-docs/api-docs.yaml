openapi: 3.0.0
info:
  title: IEEE
  version: 1.0.0
  description: 'IEEE Backend API Documentation - Test your API routes with authentication'
servers:
  - url: 'http://127.0.0.1:8001'
    description: 'Local Development Server'
  - url: 'http://localhost:8000'
    description: 'Alternative Local Server'
tags:
  - name: Dashboard
    description: 'Backend admin routes - requires authentication and admin permissions'
  - name: Site
    description: 'Public frontend routes - accessible to all users'
  - name: EventsGate
    description: 'Visitor portal routes - for event registration and management'
x-tagGroups:
  - name: Dashboard (Backend Admin)
    tags:
      - Dashboard
  - name: Site (Public Frontend)
    tags:
      - Site
  - name: EventsGate (Visitor Portal)
    tags:
      - EventsGate
paths:
  /api/dashboard/auth/login:
    post:
      summary: login
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '422':
          description: Validation error
        '500':
          description: Server error
      tags:
        - Dashboard
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: utc-millisec
            example:
              email: abdallahhamada2103@gmail.com
              password: '12345678'
  /api/dashboard/auth/logout:
    post:
      summary: logout
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '422':
          description: Validation error
        '500':
